services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: smart-lms:php83
    env_file:
      - .env
    environment:
      APP_ENV: production
      CONTAINER_ROLE: app
    ports:
      - "80:80"
    restart: unless-stopped
    volumes:
      - storage_data:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache

  queue:
    image: smart-lms:php83
    env_file:
      - .env
    environment:
      APP_ENV: production
      CONTAINER_ROLE: queue
    command: php artisan queue:work database --queue=ai-scan,default --tries=1 --sleep=1 --timeout=600 --backoff=5 --memory=768 --no-interaction
    restart: unless-stopped
    volumes:
      - storage_data:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      - app

  scheduler:
    image: smart-lms:php83
    env_file:
      - .env
    environment:
      APP_ENV: production
      CONTAINER_ROLE: scheduler
    command: /bin/sh -lc "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    restart: unless-stopped
    volumes:
      - storage_data:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      - app

volumes:
  storage_data:
  bootstrap_cache:
